<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tap Coin</title>

<style>

body{
background:#1b1b2f;
color:white;
font-family:Arial;
text-align:center;
margin-top:50px;
}

h1{
font-size:40px;
}

#coins{
font-size:30px;
margin:20px;
}

.coin{
width:150px;
height:150px;
background:gold;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:60px;
margin:auto;
cursor:pointer;
box-shadow:0 0 20px gold;
transition:0.2s;
}

.coin:active{
transform:scale(1.2);
}

</style>

</head>

<body>

<h1>💰 Tap Coin</h1>

<div id="coins">0</div>

<div class="coin" onclick="tap()">🪙</div>

<script>

let coins = localStorage.getItem("coins")

if(!coins){
coins=0
}

document.getElementById("coins").innerText = coins

function tap(){

coins++

localStorage.setItem("coins", coins)

document.getElementById("coins").innerText = coins

}

</script>

</body>
</html>
