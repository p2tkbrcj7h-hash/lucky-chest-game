<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tap Coin</title>

<style>
body{
font-family:Arial;
text-align:center;
background:#1e1e2f;
color:white;
}

h1{
margin-top:20px;
}

#coin{
font-size:100px;
cursor:pointer;
transition:0.2s;
}

#coin:active{
transform:scale(1.2);
}

button{
padding:10px;
margin:5px;
font-size:18px;
border-radius:10px;
border:none;
}

.shop{
margin-top:30px;
background:#2c2c3f;
padding:15px;
border-radius:15px;
display:inline-block;
}
</style>

</head>

<body>

<h1>🪙 Tap Coin</h1>

<h2 id="coins">0</h2>

<div id="coin" onclick="tap()">🪙</div>

<div class="shop">

<h3>⭐ Shop</h3>

<button onclick="boost()">x2 coins (10⭐)</button>

<button onclick="mega()">x10 coins (30⭐)</button>

</div>

<script>

let coins=0
let multiplier=1

function tap(){

coins+=multiplier

document.getElementById("coins").innerText=coins

}

function boost(){

multiplier=2
alert("Boost activated!")

}

function mega(){

multiplier=10
alert("Mega boost activated!")

}

</script>

</body>
</html>
