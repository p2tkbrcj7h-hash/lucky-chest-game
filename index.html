<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tap Coin</title>

<style>
body{
  background:#1b1b2f;
  color:white;
  font-family:Arial;
  text-align:center;
  margin-top:40px;
}

#coins{
  font-size:35px;
  margin:20px;
}

.coin{
  width:180px;
  cursor:pointer;
  transition:0.15s;
}

.coin:active{
  transform:scale(1.2);
}
</style>
</head>

<body>

<h1>🪙 Tap Coin</h1>

<div id="coins">0</div>

<img class="coin" src="https://cdn-icons-png.flaticon.com/512/138/138292.png" onclick="tap()">

<script>
// Telegram WebApp API (если открыто в Telegram)
if (window.Telegram) {
    Telegram.WebApp.ready();
    const user = Telegram.WebApp.initDataUnsafe?.user;
    console.log("Telegram User:", user);
}

// Игровая логика Tap Coin
let coins = Number(localStorage.getItem("coins")) || 0;
const display = document.getElementById("coins");
display.innerText = coins;

function tap(){
    coins++;
    localStorage.setItem("coins", coins);
    display.innerText = coins;
}
</script>

</body>
</html>
