<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tap Coin</title>

<style>

body{
background:#1b1b2f;
color:white;
font-family:Arial;
text-align:center;
margin-top:40px;
}

#coins{
font-size:35px;
margin:20px;
}

.coin{
width:180px;
cursor:pointer;
transition:0.15s;
}

.coin:active{
transform:scale(1.2);
}

</style>
</head>

<body>

<h1>🪙 Tap Coin</h1>

<div id="coins">0</div>

<img class="coin" src="https://cdn-icons-png.flaticon.com/512/138/138292.png" onclick="tap()">

<script>

let coins = Number(localStorage.getItem("coins")) || 0;

document.getElementById("coins").innerText = coins;

function tap(){

coins++;

localStorage.setItem("coins", coins);

document.getElementById("coins").innerText = coins;

}

</script>

</body>
</html>
